apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.sandbox.nexusbox.io
spec:
  group: sandbox.nexusbox.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                displayName:
                  type: string
                resourceQuota:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    gpu:
                      type: string
                    ephemeralStorage:
                      type: string
                    persistentStorage:
                      type: string
                    maxInstances:
                      type: integer
                    maxInstancesPerNode:
                      type: integer
                isolationPolicy:
                  type: object
                  properties:
                    isolationLevel:
                      type: string
                      enum: ["basic", "standard", "enhanced", "maximum"]
                    dedicatedNodes:
                      type: array
                      items:
                        type: string
                    allowedRuntimes:
                      type: array
                      items:
                        type: string
                    networkIsolation:
                      type: boolean
                maxConcurrentSandboxes:
                  type: integer
                maxSandboxesPerDay:
                  type: integer
                rateLimit:
                  type: object
                  properties:
                    sandboxCreatePerSecond:
                      type: integer
                    sandboxCreateBurst:
                      type: integer
                    apiCallPerSecond:
                      type: integer
                    apiCallBurst:
                      type: integer
                schedulingPolicy:
                  type: object
                  properties:
                    priorityClass:
                      type: string
                    preemptionPolicy:
                      type: string
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
              required:
                - resourceQuota
            status:
              type: object
              properties:
                phase:
                  type: string
                activeSandboxCount:
                  type: integer
                totalSandboxCount:
                  type: integer
                resourceUsage:
                  type: object
                  properties:
                    cpuUsed:
                      type: string
                    memoryUsed:
                      type: string
                    gpuUsed:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Active
          type: integer
          jsonPath: .status.activeSandboxCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Cluster
  names:
    plural: tenants
    singular: tenant
    kind: Tenant
    shortNames:
      - tnt

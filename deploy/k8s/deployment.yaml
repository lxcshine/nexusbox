apiVersion: v1
kind: Namespace
metadata:
  name: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox
    app.kubernetes.io/part-of: nexusbox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-manager
  namespace: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-manager-role
  labels:
    app.kubernetes.io/name: nexusbox-manager
rules:
  - apiGroups: ["sandbox.nexusbox.io"]
    resources: ["sandboxes", "sandboxes/status", "tenants", "tenants/status", "sandboxquotas", "sandboxquotas/status", "sandboxtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "events", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-manager-binding
  labels:
    app.kubernetes.io/name: nexusbox-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sandbox-manager-role
subjects:
  - kind: ServiceAccount
    name: sandbox-manager
    namespace: nexusbox-system
---
# Sandbox Manager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-manager
  namespace: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox-manager
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusbox-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexusbox-manager
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: sandbox-manager
      containers:
        - name: manager
          image: nexusbox/sandbox-manager:latest
          imagePullPolicy: IfNotPresent
          command:
            - /sandbox-manager
          args:
            - --port=8080
            - --metrics-port=9090
            - --workers=5
            - --enable-scheduler=true
            - --enable-controller=true
            - --pool-enabled=true
            - --v=2
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
# Sandbox Manager Service
apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager
  namespace: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox-manager
spec:
  selector:
    app.kubernetes.io/name: nexusbox-manager
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
---
# Sandbox Agent DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sandbox-agent
  namespace: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox-agent
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusbox-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexusbox-agent
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: sandbox-manager
      hostNetwork: true
      hostPID: true
      hostIPC: true
      containers:
        - name: agent
          image: nexusbox/sandbox-agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - /sandbox-agent
          args:
            - --node-name=$(NODE_NAME)
            - --node-ip=$(NODE_IP)
            - --control-plane-url=http://sandbox-manager.nexusbox-system.svc:8080
            - --port=9091
            - --heartbeat-interval=10s
            - --max-sandboxes=100
            - --v=2
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - name: http
              containerPort: 9091
              hostPort: 9091
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
            - name: kata-sock
              mountPath: /run/kata-containers
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: kata-sock
          hostPath:
            path: /run/kata-containers
            type: DirectoryOrCreate
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: proc
          hostPath:
            path: /proc
            type: Directory
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
---
# Sandbox Scheduler Deployment (optional, for standalone scheduler)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-scheduler
  namespace: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox-scheduler
    app.kubernetes.io/component: scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusbox-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexusbox-scheduler
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: sandbox-manager
      containers:
        - name: scheduler
          image: nexusbox/sandbox-scheduler:latest
          imagePullPolicy: IfNotPresent
          command:
            - /sandbox-scheduler
          args:
            - --port=8081
            - --max-attempts=5
            - --workers=3
            - --batch-enabled=true
            - --v=2
          ports:
            - name: http
              containerPort: 8081
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
# Monitoring Dashboard Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-dashboard
  namespace: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox-dashboard
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusbox-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexusbox-dashboard
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: dashboard
          image: nexusbox/sandbox-dashboard:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/dashboard.py
          args:
            - --host=0.0.0.0
            - --port=3000
            - --api-url=http://sandbox-manager.nexusbox-system.svc:8080
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/dashboard/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
# Dashboard Service
apiVersion: v1
kind: Service
metadata:
  name: sandbox-dashboard
  namespace: nexusbox-system
  labels:
    app.kubernetes.io/name: nexusbox-dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nexusbox-dashboard
  ports:
    - name: http
      port: 3000
      targetPort: http

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxes.sandbox.nexusbox.io
spec:
  group: sandbox.nexusbox.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                tenantRef:
                  type: object
                  properties:
                    name:
                      type: string
                templateRef:
                  type: object
                  properties:
                    name:
                      type: string
                runtime:
                  type: string
                  enum: ["kata-containers", "gvisor", "runc"]
                image:
                  type: string
                command:
                  type: array
                  items:
                    type: string
                args:
                  type: array
                  items:
                    type: string
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    gpu:
                      type: string
                    ephemeralStorage:
                      type: string
                network:
                  type: object
                  properties:
                    networkMode:
                      type: string
                      enum: ["bridge", "host", "none", "cni"]
                    ports:
                      type: array
                      items:
                        type: object
                        properties:
                          containerPort:
                            type: integer
                          hostPort:
                            type: integer
                          protocol:
                            type: string
                storage:
                  type: object
                  properties:
                    volumes:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          mountPath:
                            type: string
                          size:
                            type: string
                security:
                  type: object
                  properties:
                    readOnlyRootFilesystem:
                      type: boolean
                    runAsNonRoot:
                      type: boolean
                    capabilities:
                      type: object
                schedulingPolicy:
                  type: object
                  properties:
                    priority:
                      type: integer
                    nodeAffinity:
                      type: array
                      items:
                        type: object
                        properties:
                          matchLabels:
                            type: object
                            additionalProperties:
                              type: string
                    nodeAntiAffinity:
                      type: array
                      items:
                        type: object
                        properties:
                          matchLabels:
                            type: object
                            additionalProperties:
                              type: string
                    batchID:
                      type: string
                    isolationLevel:
                      type: string
                      enum: ["basic", "standard", "enhanced", "maximum"]
                maxLifetimeSeconds:
                  type: integer
                idleTimeoutSeconds:
                  type: integer
                gracefulShutdownSeconds:
                  type: integer
                autoDeleteOnCompletion:
                  type: boolean
              required:
                - tenantRef
                - runtime
            status:
              type: object
              properties:
                phase:
                  type: string
                nodeName:
                  type: string
                startTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                retryCount:
                  type: integer
                reason:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Node
          type: string
          jsonPath: .status.nodeName
        - name: Tenant
          type: string
          jsonPath: .spec.tenantRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sandboxes
    singular: sandbox
    kind: Sandbox
    shortNames:
      - sb

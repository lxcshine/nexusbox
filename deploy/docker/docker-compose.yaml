version: "2.4"

services:
  sandbox:
    container_name: nexusbox-sandbox
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    # Security hardening
    security_opt:
      - no-new-privileges:true
    # Drop all capabilities, then add only what's needed
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    # Resource limits
    shm_size: "2gb"
    mem_limit: "8g"
    # cpus and pids_limit removed for compatibility with older docker-compose
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "unless-stopped"
    ports:
      - "${HOST_PORT:-8080}:8080"    # Gateway API
      - "${VNC_PORT:-6080}:6080"     # noVNC Web Desktop
      - "${MCP_PORT:-8079}:8079"     # MCP Hub
      - "${JUPYTER_PORT:-8888}:8888" # JupyterLab
      - "${CODE_SERVER_PORT:-8200}:8200" # VS Code Server
    environment:
      PROXY_SERVER: ${PROXY_SERVER:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      DNS_OVER_HTTPS_TEMPLATES: ${DNS_OVER_HTTPS_TEMPLATES:-"https://cloudflare-dns.com/dns-query{?dns}"}
      WORKSPACE: ${WORKSPACE:-"/home/sandbox"}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VNC_SERVER_PORT: 5900
      PUBLIC_PORT: 8080
      MCP_HUB_PORT: 8079
      PROXY_PORT: 6081
      WEBSOCKET_PROXY_PORT: 6080
      JUPYTER_LAB_PORT: 8888
      CODE_SERVER_PORT: 8200
      BROWSER_REMOTE_DEBUGGING_PORT: 9222
    volumes:
      - sandbox-workspace:/home/sandbox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  sandbox-workspace:

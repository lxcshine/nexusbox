name: CI

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.22'
  GOLANGCI_LINT_VERSION: 'v1.57'

jobs:
  # ============================================================================
  # Lint
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  # ============================================================================
  # Format Check
  # ============================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: test -z "$(gofmt -l .)" || (echo "Files need formatting:"; gofmt -l .; exit 1)

  # ============================================================================
  # Vet
  # ============================================================================
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...

  # ============================================================================
  # Unit Tests
  # ============================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, vet]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./pkg/...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out

  # ============================================================================
  # Build
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit]
    strategy:
      matrix:
        target:
          - sandbox-manager
          - sandbox-agent
          - sandbox-scheduler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build ${{ matrix.target }}
        run: go build -o bin/${{ matrix.target }} ./cmd/${{ matrix.target }}

  # ============================================================================
  # Docker Build & Push
  # ============================================================================
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        target:
          - manager
          - agent
          - scheduler
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/sandbox-${{ matrix.target }}:latest
            ghcr.io/${{ github.repository }}/sandbox-${{ matrix.target }}:${{ github.sha }}

  # ============================================================================
  # Code Generation Check
  # ============================================================================
  codegen-check:
    name: Codegen Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check generated code is up to date
        run: |
          make generate
          git diff --exit-code || (echo "Generated code is out of date. Run 'make generate' and commit the changes."; exit 1)

  # ============================================================================
  # Go Module Check
  # ============================================================================
  mod-check:
    name: Module Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum is not tidy. Run 'go mod tidy' and commit."; exit 1)
